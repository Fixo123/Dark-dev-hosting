services:
  - type: web
    name: dark-dev-ofc-api
    env: node
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: CLOUDFLARE_ACCOUNT_ID
        sync: false
      - key: CLOUDFLARE_API_TOKEN
        sync: false
    healthCheckPath: /
    autoDeploy: true

  - type: static
    name: dark-dev-ofc
    env: static
    buildCommand: ""
    staticPublishPath: .
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    headers:
      - path: /*
        name: X-Frame-Options
        value: DENY
