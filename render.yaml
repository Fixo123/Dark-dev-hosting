services:
  - type: web
    name: dark-dev-hosting-api
    env: node
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NETLIFY_TOKEN
        sync: false
      - key: NETLIFY_ACCOUNT_ID
        sync: false
      - key: GITHUB_TOKEN
        sync: false
    healthCheckPath: /
    autoDeploy: true

  - type: static
    name: dark-dev-hosting
    env: static
    buildCommand: ""
    staticPublishPath: .
    routes:
      - type: rewrite
        source: /*
        destination: /index.html